---
apiVersion: apps/v1
kind: Deployment
metadata:
  annotations:
    kompose.cmd: kompose convert
    kompose.version: 1.26.0 (40646f47)
  creationTimestamp: null
  labels:
    app: qcguy
    io.kompose.service: qcguy
  name: qcguy
  namespace: qcguy
spec:
  replicas: 1
  selector:
    matchLabels:
      app: qcguy
      io.kompose.service: qcguy
  # Keep the old pod serving until the new one is Ready, so Cloudflare never
  # hits an empty NodePort during a rollout (caused visitor-facing 502s).
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      annotations:
        kompose.cmd: kompose convert
        kompose.version: 1.26.0 (40646f47)
        # --- Vault Agent Injector: render config.production.json from kv/qcguy/ghost ---
        # Secret is owned in this repo (vault/ghost.secret.sops.env) and refreshed at
        # deploy by the vaultSync(app:'qcguy') stage in the Jenkinsfile.
        vault.hashicorp.com/agent-inject: 'true'
        vault.hashicorp.com/role: 'qcguy-role'
        vault.hashicorp.com/agent-pre-populate-only: 'true'
        vault.hashicorp.com/agent-inject-secret-config.production.json: 'kv/qcguy/ghost'
        vault.hashicorp.com/agent-inject-template-config.production.json: |
          {{- with secret "kv/qcguy/ghost" -}}{{ .Data.data.CONFIG_PRODUCTION_JSON_B64 | base64Decode }}{{- end -}}
      creationTimestamp: null
      labels:
        io.kompose.service: qcguy
        app: qcguy
    spec:
      serviceAccountName: vault-secrets
      volumes:
        - name: qcguy-content-storage
          persistentVolumeClaim:
            claimName: qcguy-content-claim
      containers:
        - env:
            - name: url
              value: https://www.qcguy.com
          image: ghost:6.47.0
          #imagePullPolicy: Always
          name: qcguy
          # Copy the Vault-rendered config to where Ghost expects it, then start Ghost
          # (replicates the image's default ENTRYPOINT+CMD: docker-entrypoint.sh node current/index.js).
          command: ["/bin/sh","-c"]
          args:
            - cp /vault/secrets/config.production.json /var/lib/ghost/config.production.json && exec docker-entrypoint.sh node current/index.js
          ports:
            - containerPort: 2368
          # Gate traffic on Ghost actually serving HTTP. Ghost (url=https://...) 301-
          # redirects plain HTTP / to https; kubelet follows the redirect onto the
          # plaintext 2368 port and fails the TLS handshake ("server gave HTTP response
          # to HTTPS client"), so the probe never passes. X-Forwarded-Proto: https tells
          # Ghost the request is already secure, so it returns 200 with no redirect.
          # Combined with maxUnavailable:0 the rollout is seamless.
          # Generous failureThreshold covers Ghost's ~20-40s boot without a startupProbe.
          readinessProbe:
            httpGet:
              path: /
              port: 2368
              httpHeaders:
                - name: X-Forwarded-Proto
                  value: https
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
          # Ghost CMS, ~100 visitors/day. Observed ~595Mi steady, ~1.25 CPU on spikes.
          resources:
            requests:
              cpu: "200m"
              memory: "256Mi"
            limits:
              cpu: "2"
              memory: "1Gi"
          volumeMounts:
            - mountPath: /var/lib/ghost/content #/mnt/qcguy-ghost/data
              name: qcguy-content-storage
      #restartPolicy: Never
status: {}
---
apiVersion: v1
kind: Service
metadata:
  name: mysql
  namespace: qcguy
  labels:
    app: mysql
spec:
  clusterIP: None          # headless — stable DNS mysql.qcguy.svc.cluster.local
  selector:
    app: mysql
  ports:
    - port: 3306
      targetPort: 3306
      name: mysql
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mysql
  namespace: qcguy
  labels:
    app: mysql
spec:
  serviceName: mysql
  replicas: 1
  selector:
    matchLabels:
      app: mysql
  template:
    metadata:
      labels:
        app: mysql
      annotations:
        # Render the MySQL passwords from the same Vault bundle Ghost uses.
        vault.hashicorp.com/agent-inject: 'true'
        vault.hashicorp.com/role: 'qcguy-role'
        vault.hashicorp.com/agent-pre-populate-only: 'true'
        vault.hashicorp.com/agent-inject-secret-mysql-root: 'kv/qcguy/ghost'
        vault.hashicorp.com/agent-inject-template-mysql-root: |
          {{- with secret "kv/qcguy/ghost" -}}{{ .Data.data.MYSQL_ROOT_PASSWORD }}{{- end -}}
        vault.hashicorp.com/agent-inject-secret-mysql-pass: 'kv/qcguy/ghost'
        vault.hashicorp.com/agent-inject-template-mysql-pass: |
          {{- with secret "kv/qcguy/ghost" -}}{{ .Data.data.MYSQL_PASSWORD }}{{- end -}}
    spec:
      serviceAccountName: vault-secrets
      containers:
        - name: mysql
          image: mysql:8.0
          # Force native auth so Ghost's mysql2 driver can never be rejected by
          # caching_sha2_password mid-cutover.
          args: ["--default-authentication-plugin=mysql_native_password"]
          env:
            - name: MYSQL_ROOT_PASSWORD_FILE
              value: /vault/secrets/mysql-root
            - name: MYSQL_PASSWORD_FILE
              value: /vault/secrets/mysql-pass
            - name: MYSQL_DATABASE
              value: ghost
            - name: MYSQL_USER
              value: ghost
          ports:
            - containerPort: 3306
              name: mysql
          resources:
            requests:
              cpu: "250m"
              memory: "384Mi"
            limits:
              cpu: "1"
              memory: "1Gi"
          readinessProbe:
            exec:
              command: ["sh", "-c", "mysqladmin ping -h 127.0.0.1 -u root -p\"$(cat /vault/secrets/mysql-root)\" --silent"]
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
          volumeMounts:
            - name: mysql-data
              mountPath: /var/lib/mysql
  volumeClaimTemplates:
    - metadata:
        name: mysql-data
      spec:
        accessModes: ["ReadWriteOnce"]
        # manual + the qcguy-mysql-pv below (hostPath /mnt/qcguy-mysql) so MySQL's
        # datadir lives in the minikube /mnt mount — captured by the weekly
        # backup-minikube-mnt.sh tar + GCS, matching predictonomy/dyingpaleblue postgres.
        storageClassName: manual
        resources:
          requests:
            storage: 2Gi
---
# MySQL datadir on a hostPath under the backed-up minikube mount. claimRef pins it
# to the StatefulSet's PVC so the manual bind is deterministic.
apiVersion: v1
kind: PersistentVolume
metadata:
  name: qcguy-mysql-pv
  labels:
    app: mysql
spec:
  capacity:
    storage: 2Gi
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  storageClassName: manual
  hostPath:
    path: /mnt/qcguy-mysql
    type: DirectoryOrCreate
  claimRef:
    namespace: qcguy
    name: mysql-data-mysql-0
---
# --- Daily logical backup of the ghost DB (crash-consistent mysqldump) ---
# Writes qcguy-MM-DD-YY.sql.gz into /mnt/qcguy-mysql-backups (also in the weekly
# tar + GCS), keeping the 14 most recent. Mirrors predictonomy-postgres-backup.
apiVersion: v1
kind: PersistentVolume
metadata:
  name: qcguy-mysql-backups-pv
  labels:
    app: qcguy-mysql-backups
spec:
  capacity:
    storage: 1Gi
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  storageClassName: manual
  hostPath:
    path: /mnt/qcguy-mysql-backups
    type: DirectoryOrCreate
  claimRef:
    namespace: qcguy
    name: qcguy-mysql-backups-pvc
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: qcguy-mysql-backups-pvc
  namespace: qcguy
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: manual
  resources:
    requests:
      storage: 1Gi
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: qcguy-mysql-backup
  namespace: qcguy
  labels:
    app: qcguy-mysql-backup
spec:
  schedule: "0 2 * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      activeDeadlineSeconds: 1800
      backoffLimit: 1
      ttlSecondsAfterFinished: 86400
      template:
        metadata:
          annotations:
            vault.hashicorp.com/agent-inject: 'true'
            vault.hashicorp.com/role: 'qcguy-role'
            vault.hashicorp.com/agent-pre-populate-only: 'true'
            vault.hashicorp.com/agent-inject-secret-config: 'kv/qcguy/ghost'
            vault.hashicorp.com/agent-inject-template-config: |
              {{- with secret "kv/qcguy/ghost" -}}
              export MYSQL_PWD="{{ .Data.data.MYSQL_PASSWORD }}"
              {{- end }}
        spec:
          serviceAccountName: vault-secrets
          restartPolicy: Never
          volumes:
            - name: backups
              persistentVolumeClaim:
                claimName: qcguy-mysql-backups-pvc
          containers:
            - name: mysql-backup
              image: mysql:8.0
              imagePullPolicy: IfNotPresent
              command: ["/bin/sh","-c"]
              args:
                - |
                  set -eu
                  . /vault/secrets/config
                  day=$(date +%m-%d-%y)
                  out="/backups/qcguy-${day}.sql.gz"
                  echo "[backup] dumping ghost -> ${out}"
                  mysqldump -h mysql.qcguy.svc.cluster.local -u ghost \
                    --single-transaction --routines --triggers --events \
                    --no-tablespaces --databases ghost | gzip -c > "$out"
                  echo "[backup] wrote $(ls -lh "$out" | awk '{print $5, $9}')"
                  echo "[backup] rotating — keeping the 14 most recent"
                  ls -1t /backups/qcguy-*.sql.gz | tail -n +15 | xargs -r rm -f
                  echo "[backup] retained:"; ls -1t /backups/qcguy-*.sql.gz
              resources:
                requests:
                  cpu: "100m"
                  memory: "128Mi"
                limits:
                  cpu: "500m"
                  memory: "256Mi"
              volumeMounts:
                - name: backups
                  mountPath: /backups